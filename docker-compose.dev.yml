name: luma-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: luma
      POSTGRES_USER: luma_user
      POSTGRES_PASSWORD: ${LUMA_DB_PASS:-devpass}
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
      - ./src/luma/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U luma_user -d luma" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata-dev:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  auth:
    build:
      context: ./src/luma-auth
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      HAVEN_DB_HOST: postgres
      HAVEN_DB_PASS: ${HAVEN_DB_PASS:-devpass}
      HAVEN_REDIS_ADDR: redis:6379
      HAVEN_JWT_SIGNING_KEY: ${HAVEN_JWT_SIGNING_KEY:-61a15cb016a661c9ba248baece7a39a680e8d17971ad155ced32781f54bbcfd5}
      HAVEN_BASE_URL: http://localhost:8080
      HAVEN_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./src/luma-auth:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  luma:
    build:
      context: ./src/luma
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      LUMA_DB_URL: postgres://luma_user:${LUMA_DB_PASS:-devpass}@postgres:5432/luma?sslmode=disable&search_path=luma
      LUMA_REDIS_URL: redis://redis:6379
      LUMA_HAVEN_URL: http://auth:8080
      LUMA_PUBLIC_URL: ${LUMA_PUBLIC_URL:-http://localhost:8002}
      LUMA_PORT: 8002
      LUMA_DEV_MODE: "true"
      LUMA_STATIC_DIR: ${LUMA_STATIC_DIR:-}
    ports:
      - "8002:8002"
    volumes:
      - ./src/luma:/src
      - ./artifacts/web:/artifacts/web:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - internal

volumes:
  pgdata-dev:
  redisdata-dev:


networks:
  internal:
